name: CLI Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'cli-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --no-frozen-lockfile

      - name: Build shared
        run: pnpm --filter @qaskills/shared build

      - name: Build CLI
        run: pnpm --filter @qaskills/cli build

      - name: Unit tests
        run: pnpm --filter @qaskills/cli test

      # Hard gate: the built CLI must pass the full end-to-end suite against the
      # live registry (init regression pack, random 5-10 skill installs, content
      # and artifact contracts) before anything reaches npm. Telemetry is
      # disabled inside the suite so gate runs never inflate install counts.
      - name: E2E publish gate
        run: pnpm --filter @qaskills/cli e2e

      - name: Publish to npm
        run: pnpm --filter @qaskills/cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
