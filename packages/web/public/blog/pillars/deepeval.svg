<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DeepEval 4 pytest-style evaluation for LLMs RAG and agents</title><desc id="desc">A Python evaluation suite maps test cases to RAG metrics, agent traces, conversational simulations, and continuous integration.</desc>
  <defs><linearGradient id="bg" x1="0" y1="1" x2="1" y2="0"><stop stop-color="#101922"/><stop offset=".55" stop-color="#173c4a"/><stop offset="1" stop-color="#1b7c78"/></linearGradient><radialGradient id="g" cx=".78" cy=".18" r=".7"><stop stop-color="#9bffcf" stop-opacity=".38"/><stop offset="1" stop-color="#9bffcf" stop-opacity="0"/></radialGradient><filter id="s"><feDropShadow dx="0" dy="22" stdDeviation="25" flood-color="#061014" flood-opacity=".6"/></filter></defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#g)"/><text x="145" y="132" fill="#f5fff9" font-family="ui-sans-serif,system-ui,sans-serif" font-size="62" font-weight="750">DEEPEVAL 4</text><text x="150" y="180" fill="#b8f5d7" font-family="ui-monospace,monospace" font-size="23" letter-spacing="5">PYTEST / RAG / AGENTS / SIMULATION</text>
  <g transform="translate(145 245)" filter="url(#s)"><rect width="870" height="520" rx="36" fill="#081820" stroke="#9bffcf" stroke-opacity=".48" stroke-width="2"/><rect width="870" height="72" rx="36" fill="#14313d"/><circle cx="48" cy="36" r="10" fill="#ff776d"/><circle cx="82" cy="36" r="10" fill="#ffd166"/><circle cx="116" cy="36" r="10" fill="#83edbd"/><text x="58" y="142" fill="#9bffcf" font-family="ui-monospace,monospace" font-size="24">def test_agent_checkout():</text><text x="92" y="196" fill="#dbeee7" font-family="ui-monospace,monospace" font-size="22">assert_test(test_case, metrics=[</text><text x="127" y="244" fill="#ffd166" font-family="ui-monospace,monospace" font-size="22">TaskCompletionMetric(),</text><text x="127" y="288" fill="#ffd166" font-family="ui-monospace,monospace" font-size="22">ToolCorrectnessMetric(),</text><text x="92" y="332" fill="#dbeee7" font-family="ui-monospace,monospace" font-size="22">])</text><rect x="58" y="388" width="755" height="80" rx="20" fill="#12352f"/><text x="94" y="437" fill="#83edbd" font-family="ui-monospace,monospace" font-size="23">4 passed · trace evidence retained</text></g>
  <g transform="translate(1110 290)" filter="url(#s)"><circle cx="180" cy="180" r="174" fill="#0e2931" stroke="#83edbd" stroke-width="3"/><circle cx="180" cy="180" r="105" fill="#195146"/><path d="M135 184l30 30 65-82" fill="none" stroke="#9bffcf" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/><text x="180" y="400" text-anchor="middle" fill="#f5fff9" font-family="ui-sans-serif,system-ui,sans-serif" font-size="27" font-weight="700">TRACE-GRADED</text><text x="180" y="438" text-anchor="middle" fill="#b8f5d7" font-family="ui-monospace,monospace" font-size="18">repeatable evals</text></g>
</svg>
