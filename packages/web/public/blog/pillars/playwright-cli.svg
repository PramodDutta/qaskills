<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Playwright CLI browser automation for coding agents</title>
  <desc id="desc">A terminal connected to browser sessions, snapshots, traces, and test verification tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071a1f"/>
      <stop offset="0.55" stop-color="#0b3740"/>
      <stop offset="1" stop-color="#0d5961"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.18" r="0.7">
      <stop offset="0" stop-color="#ffd166" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#b9f3ec" stroke-opacity="0.07"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#001013" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <g opacity="0.9">
    <path d="M1120 165C1305 165 1390 260 1390 440S1290 735 1095 735" fill="none" stroke="#79e6d7" stroke-opacity="0.28" stroke-width="3"/>
    <circle cx="1288" cy="216" r="13" fill="#ffd166"/>
    <circle cx="1388" cy="439" r="13" fill="#79e6d7"/>
    <circle cx="1242" cy="687" r="13" fill="#ff8f66"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="158" y="154" width="965" height="592" rx="28" fill="#061316" stroke="#79e6d7" stroke-opacity="0.42" stroke-width="2"/>
    <rect x="158" y="154" width="965" height="74" rx="28" fill="#102a30"/>
    <path d="M158 228H1123" stroke="#79e6d7" stroke-opacity="0.22"/>
    <circle cx="207" cy="191" r="11" fill="#ff756b"/>
    <circle cx="244" cy="191" r="11" fill="#ffd166"/>
    <circle cx="281" cy="191" r="11" fill="#72dfb2"/>
    <text x="640" y="200" text-anchor="middle" fill="#bce7e2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">playwright-cli</text>

    <text x="217" y="306" fill="#ffd166" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="31">$ playwright-cli open qaskills.sh</text>
    <text x="217" y="368" fill="#79e6d7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="27">Session qa-61 attached</text>
    <text x="217" y="430" fill="#e9fbf8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="29">$ playwright-cli snapshot</text>
    <text x="244" y="489" fill="#9dbdb9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="25">- heading "Browse QA Skills"</text>
    <text x="244" y="538" fill="#9dbdb9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="25">- textbox "Search skills" [ref=e7]</text>
    <text x="217" y="608" fill="#e9fbf8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="29">$ playwright-cli verify-text-visible</text>
    <rect x="217" y="648" width="295" height="42" rx="21" fill="#143a3e" stroke="#72dfb2" stroke-opacity="0.8"/>
    <text x="365" y="677" text-anchor="middle" fill="#72dfb2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">PASS: page verified</text>
  </g>

  <g transform="translate(1165 280)" filter="url(#shadow)">
    <rect width="280" height="330" rx="28" fill="#f4f1e8"/>
    <rect x="28" y="31" width="224" height="144" rx="18" fill="#143a3e"/>
    <rect x="48" y="54" width="82" height="13" rx="6" fill="#79e6d7"/>
    <rect x="48" y="82" width="162" height="9" rx="4" fill="#b9f3ec" opacity="0.55"/>
    <rect x="48" y="105" width="135" height="9" rx="4" fill="#b9f3ec" opacity="0.35"/>
    <rect x="48" y="133" width="64" height="22" rx="11" fill="#ffd166"/>
    <path d="M53 235H226" stroke="#0d5961" stroke-width="9" stroke-linecap="round" opacity="0.22"/>
    <path d="M53 273H181" stroke="#0d5961" stroke-width="9" stroke-linecap="round" opacity="0.22"/>
    <circle cx="218" cy="268" r="34" fill="#ff8f66"/>
    <path d="m205 268 10 10 19-23" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="159" y="112" fill="#f4f1e8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="54" font-weight="700" letter-spacing="-1">PLAYWRIGHT CLI</text>
  <text x="1120" y="802" text-anchor="end" fill="#b9f3ec" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" letter-spacing="5">SNAPSHOT / DEBUG / VERIFY</text>
</svg>
