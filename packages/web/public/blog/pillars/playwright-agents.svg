<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Playwright Planner Generator and Healer test agents</title><desc id="desc">Three connected agent roles transform a product brief into a test plan, executable tests, and repaired failures.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1a1026"/><stop offset=".5" stop-color="#49213b"/><stop offset="1" stop-color="#b34a3c"/></linearGradient><radialGradient id="g" cx=".75" cy=".15" r=".7"><stop stop-color="#ffd166" stop-opacity=".4"/><stop offset="1" stop-color="#ffd166" stop-opacity="0"/></radialGradient><filter id="s"><feDropShadow dx="0" dy="22" stdDeviation="25" flood-color="#100613" flood-opacity=".55"/></filter></defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#g)"/><text x="150" y="135" fill="#fff9f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="62" font-weight="750">PLAYWRIGHT TEST AGENTS</text><text x="154" y="183" fill="#ffd9ad" font-family="ui-monospace,monospace" font-size="23" letter-spacing="5">PLAN / GENERATE / HEAL</text>
  <path d="M465 455h165M970 455h165" stroke="#ffd166" stroke-width="7" stroke-dasharray="16 14"/><path d="m612 435 30 20-30 20m505-40 30 20-30 20" fill="none" stroke="#ffd166" stroke-width="7"/>
  <g transform="translate(120 270)" filter="url(#s)"><rect width="345" height="390" rx="36" fill="#21162d" stroke="#9dd9ff" stroke-width="2"/><circle cx="172" cy="112" r="62" fill="#304764"/><path d="M135 100h74M135 130h48" stroke="#9dd9ff" stroke-width="11" stroke-linecap="round"/><text x="172" y="226" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="700">PLANNER</text><text x="172" y="278" text-anchor="middle" fill="#b8cde5" font-family="ui-monospace,monospace" font-size="19">product → test plan</text><rect x="70" y="318" width="205" height="20" rx="10" fill="#9dd9ff" opacity=".45"/></g>
  <g transform="translate(630 270)" filter="url(#s)"><rect width="340" height="390" rx="36" fill="#2d1830" stroke="#ffd166" stroke-width="2"/><circle cx="170" cy="112" r="62" fill="#60422f"/><path d="m137 114 24 24 47-58" fill="none" stroke="#ffd166" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/><text x="170" y="226" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="700">GENERATOR</text><text x="170" y="278" text-anchor="middle" fill="#f3cda0" font-family="ui-monospace,monospace" font-size="19">plan → test code</text><rect x="68" y="318" width="205" height="20" rx="10" fill="#ffd166" opacity=".45"/></g>
  <g transform="translate(1135 270)" filter="url(#s)"><rect width="345" height="390" rx="36" fill="#311925" stroke="#83edbd" stroke-width="2"/><circle cx="172" cy="112" r="62" fill="#2e5d50"/><path d="M139 126c20-50 72-51 79-8M139 97v29h29" fill="none" stroke="#83edbd" stroke-width="12" stroke-linecap="round"/><text x="172" y="226" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="700">HEALER</text><text x="172" y="278" text-anchor="middle" fill="#b4e8d1" font-family="ui-monospace,monospace" font-size="19">failure → reviewed fix</text><rect x="70" y="318" width="205" height="20" rx="10" fill="#83edbd" opacity=".45"/></g>
</svg>
