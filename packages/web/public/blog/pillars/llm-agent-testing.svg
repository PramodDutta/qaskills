<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LLM and AI agent evaluation system</title><desc id="desc">An evaluation harness compares datasets, deterministic graders, model judges, tool traces, and production outcomes.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#121126"/><stop offset=".5" stop-color="#2c2858"/><stop offset="1" stop-color="#0d6571"/></linearGradient><radialGradient id="g" cx=".78" cy=".17" r=".65"><stop stop-color="#ffca6b" stop-opacity=".42"/><stop offset="1" stop-color="#ffca6b" stop-opacity="0"/></radialGradient><filter id="s"><feDropShadow dx="0" dy="22" stdDeviation="25" flood-color="#080715" flood-opacity=".6"/></filter></defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#g)"/><text x="145" y="132" fill="#f8f7ff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="62" font-weight="750">LLM + AGENT TESTING</text><text x="150" y="180" fill="#bfc5ff" font-family="ui-monospace,monospace" font-size="23" letter-spacing="5">DATASET / HARNESS / GRADERS / TRACES</text>
  <g transform="translate(150 250)" filter="url(#s)"><rect width="780" height="500" rx="38" fill="#10152d" stroke="#8f9cff" stroke-opacity=".6" stroke-width="2"/><text x="54" y="74" fill="#ffca6b" font-family="ui-monospace,monospace" font-size="25">evaluation_harness.run()</text><g transform="translate(55 115)"><rect width="670" height="70" rx="18" fill="#222c51"/><text x="32" y="44" fill="#cfd5ff" font-family="ui-monospace,monospace" font-size="21">01  deterministic checks</text><rect y="92" width="670" height="70" rx="18" fill="#253557"/><text x="32" y="136" fill="#cfd5ff" font-family="ui-monospace,monospace" font-size="21">02  calibrated model judge</text><rect y="184" width="670" height="70" rx="18" fill="#26425c"/><text x="32" y="228" fill="#cfd5ff" font-family="ui-monospace,monospace" font-size="21">03  tool and state outcome</text><rect y="276" width="670" height="70" rx="18" fill="#20505d"/><text x="32" y="320" fill="#cfd5ff" font-family="ui-monospace,monospace" font-size="21">04  repeated-trial reliability</text></g></g>
