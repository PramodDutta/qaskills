<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">MCP server conformance contract and security testing</title><desc id="desc">A protocol test bench validates initialization, tool schemas, transports, authorization, expected failures, and security boundaries.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111421"/><stop offset=".5" stop-color="#27334d"/><stop offset="1" stop-color="#3b6070"/></linearGradient><radialGradient id="g" cx=".8" cy=".15" r=".68"><stop stop-color="#ffbd68" stop-opacity=".42"/><stop offset="1" stop-color="#ffbd68" stop-opacity="0"/></radialGradient><filter id="s"><feDropShadow dx="0" dy="22" stdDeviation="25" flood-color="#070912" flood-opacity=".6"/></filter></defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#g)"/><text x="145" y="132" fill="#f8f9ff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="62" font-weight="750">MCP SERVER TESTING</text><text x="150" y="180" fill="#c7d7ef" font-family="ui-monospace,monospace" font-size="23" letter-spacing="5">CONFORMANCE / CONTRACT / AUTH / CI</text>
  <g transform="translate(130 250)" filter="url(#s)"><rect width="900" height="520" rx="38" fill="#0c111d" stroke="#95b8dc" stroke-opacity=".55" stroke-width="2"/><rect width="900" height="74" rx="38" fill="#202a3e"/><text x="54" y="124" fill="#ffbd68" font-family="ui-monospace,monospace" font-size="24">$ mcp-conformance server --suite active</text><g transform="translate(55 158)" font-family="ui-monospace,monospace" font-size="22"><text y="30" fill="#83edbd">PASS  initialize negotiation</text><text y="86" fill="#83edbd">PASS  tools/list schema</text><text y="142" fill="#83edbd">PASS  tools/call errors</text><text y="198" fill="#83edbd">PASS  authorization metadata</text><text y="254" fill="#ffd166">BASE  expected failure tracked</text><rect y="300" width="790" height="50" rx="16" fill="#14352f"/><text x="28" y="333" fill="#83edbd">0 unexpected regressions</text></g></g>
  <g transform="translate(1120 270)" filter="url(#s)"><path d="M175 0 350 70v154c0 132-78 216-175 266C78 440 0 356 0 224V70Z" fill="#111827" stroke="#ffbd68" stroke-width="4"/><circle cx="175" cy="185" r="82" fill="#273c4e"/><path d="m125 188 35 35 75-94" fill="none" stroke="#83edbd" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/><text x="175" y="370" text-anchor="middle" fill="#f8f9ff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="29" font-weight="700">PROTOCOL SAFE</text><text x="175" y="410" text-anchor="middle" fill="#c7d7ef" font-family="ui-monospace,monospace" font-size="18">verified boundaries</text></g>
</svg>
