<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Playwright testing architecture for reliable end-to-end automation</title>
  <desc id="desc">A browser test pipeline connecting fixtures, isolated contexts, assertions, traces, and continuous integration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071a31"/><stop offset=".55" stop-color="#123f60"/><stop offset="1" stop-color="#106b70"/></linearGradient>
    <radialGradient id="glow" cx=".82" cy=".16" r=".7"><stop stop-color="#79f2c0" stop-opacity=".42"/><stop offset="1" stop-color="#79f2c0" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse"><path d="M56 0H0V56" fill="none" stroke="#d5fff0" stroke-opacity=".07"/></pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#00111d" flood-opacity=".55"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#glow)"/><rect width="1600" height="900" fill="url(#grid)"/>
  <text x="150" y="130" fill="#f5fff9" font-family="ui-sans-serif,system-ui,sans-serif" font-size="62" font-weight="750">PLAYWRIGHT TESTING</text>
  <text x="154" y="178" fill="#9ee8d0" font-family="ui-monospace,monospace" font-size="24" letter-spacing="5">ISOLATE / ASSERT / TRACE / SHIP</text>
  <g transform="translate(150 250)" filter="url(#shadow)">
    <rect width="935" height="500" rx="34" fill="#061827" stroke="#9ee8d0" stroke-opacity=".4" stroke-width="2"/>
    <rect x="40" y="40" width="855" height="82" rx="18" fill="#13344b"/><circle cx="78" cy="81" r="11" fill="#ff776d"/><circle cx="112" cy="81" r="11" fill="#ffd166"/><circle cx="146" cy="81" r="11" fill="#79f2c0"/>
    <rect x="42" y="165" width="230" height="285" rx="22" fill="#0c2639"/><text x="75" y="214" fill="#ffd166" font-family="ui-monospace,monospace" font-size="23">fixtures</text><path d="M75 250h150M75 290h112M75 330h134M75 370h92" stroke="#79f2c0" stroke-opacity=".5" stroke-width="10" stroke-linecap="round"/>
    <rect x="310" y="165" width="545" height="285" rx="22" fill="#f4f7f1"/><rect x="342" y="198" width="481" height="45" rx="12" fill="#123f60"/><rect x="342" y="276" width="202" height="128" rx="18" fill="#d7eee6"/><rect x="574" y="276" width="249" height="22" rx="11" fill="#106b70" opacity=".65"/><rect x="574" y="320" width="196" height="16" rx="8" fill="#106b70" opacity=".25"/><rect x="574" y="356" width="226" height="16" rx="8" fill="#106b70" opacity=".25"/>
  </g>
  <g transform="translate(1155 295)"><circle cx="150" cy="150" r="142" fill="#0b2638" stroke="#79f2c0" stroke-width="3"/><path d="M83 155l47 47 94-112" fill="none" stroke="#79f2c0" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/><text x="150" y="350" text-anchor="middle" fill="#f5fff9" font-family="ui-sans-serif,system-ui,sans-serif" font-size="29" font-weight="700">RELIABLE E2E</text><text x="150" y="390" text-anchor="middle" fill="#9ee8d0" font-family="ui-monospace,monospace" font-size="19">CI EVIDENCE READY</text></g>
</svg>
